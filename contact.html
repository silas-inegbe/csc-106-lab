<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me - Academic Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">MIVA Portfolio</div>

      <nav>
        <ul id="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Me</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="planner.html">Academic Planner</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>

      <!-- Hamburger Toggle Button (Placed last to occupy the far right on mobile) -->
      <button class="hamburger" id="hamburger" aria-label="Toggle Navigation Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    <section>
      <h2>Contact Form</h2>
      <p>Use the form below to submit inquiries. Validation checks run locally on your browser.</p>

      <!-- HTML Form Element Requirement -->
      <form id="contact-form" class="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your Full Name">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="email@example.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="Digits only (e.g. 08012345678)">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Type your message details here..."></textarea>
        </div>

        <button type="submit">Submit Message</button>

        <!-- Form Feedback Placement Targets -->
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message">Your message has been validated and sent successfully!</div>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 MIVA Student Portfolio. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
